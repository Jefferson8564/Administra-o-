<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 Diagnóstico Push — Rei da Coxinha</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; padding: 16px; }
  h1 { color: #f59e0b; font-size: 18px; margin-bottom: 4px; }
  .sub { color: #555; font-size: 12px; margin-bottom: 20px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 10px; }
  .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 8px; font-family: 'Courier New', monospace; transition: opacity 0.15s; }
  .btn:active { opacity: 0.75; }
  .btn-yellow { background: #f59e0b; color: #000; }
  .btn-green { background: #10b981; color: #fff; }
  .btn-red { background: #ef4444; color: #fff; }
  .btn-blue { background: #3b82f6; color: #fff; }
  .btn-purple { background: #8b5cf6; color: #fff; }
  .btn-gray { background: #333; color: #ccc; }
  .log { background: #111; border-radius: 8px; padding: 10px; font-size: 12px; line-height: 1.7; max-height: 300px; overflow-y: auto; border: 1px solid #222; }
  .ok { color: #10b981; }
  .err { color: #ef4444; }
  .warn { color: #f59e0b; }
  .info { color: #60a5fa; }
  .dim { color: #555; }
  .status-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; font-size: 13px; }
  .status-row:last-child { border-bottom: none; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .badge-ok { background: #064e3b; color: #10b981; }
  .badge-err { background: #450a0a; color: #ef4444; }
  .badge-warn { background: #451a03; color: #f59e0b; }
  .badge-unknown { background: #1e1b4b; color: #818cf8; }
</style>
</head>
<body>

<h1>🔬 Diagnóstico Push</h1>
<p class="sub">O Rei da Coxinha — ferramenta de debug</p>

<!-- STATUS GERAL -->
<div class="card">
  <div class="card-title">📊 Status Geral</div>
  <div id="statusGeral">
    <div class="status-row"><span>Service Worker</span><span class="badge badge-unknown" id="st-sw">Verificando...</span></div>
    <div class="status-row"><span>PushManager</span><span class="badge badge-unknown" id="st-pm">Verificando...</span></div>
    <div class="status-row"><span>Permissão</span><span class="badge badge-unknown" id="st-perm">Verificando...</span></div>
    <div class="status-row"><span>Subscription</span><span class="badge badge-unknown" id="st-sub">Verificando...</span></div>
    <div class="status-row"><span>Endpoint FCM</span><span class="badge badge-unknown" id="st-fcm">Verificando...</span></div>
    <div class="status-row"><span>Config no Banco</span><span class="badge badge-unknown" id="st-db">Verificando...</span></div>
    <div class="status-row"><span>Edge Function</span><span class="badge badge-unknown" id="st-fn">Verificando...</span></div>
  </div>
</div>

<!-- AÇÕES -->
<div class="card">
  <div class="card-title">⚡ Ações</div>
  <button class="btn btn-yellow" onclick="rodarDiagnostico()">🔍 Rodar Diagnóstico Completo</button>
  <button class="btn btn-green" onclick="renovarSubscription()">🔄 Renovar Subscription</button>
  <button class="btn btn-blue" onclick="testarFuncao()">📡 Testar Edge Function</button>
  <button class="btn btn-purple" onclick="testarNotificacaoLocal()">🔔 Testar Notificação Local</button>
  <button class="btn btn-red" onclick="limparTudo()">🗑️ Limpar SW + Subscription</button>
  <button class="btn btn-gray" onclick="verSubscription()">👁️ Ver Subscription Atual</button>
</div>

<!-- LOG -->
<div class="card">
  <div class="card-title">📋 Log</div>
  <div class="log" id="logBox"><span class="dim">Aguardando ação...</span></div>
</div>

<script>
const SUPABASE_URL = 'https://vpeyqgijajywgswmezlh.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ';
const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTI1MzUwMiwiZXhwIjoyMDg2ODI5NTAyfQ.WCCPlMnbR-gJrZlt1wtTtEFkYPkBHUWcM3jxX-3Z51g';
const VAPID_PUBLIC = 'BGjzyTlEdCkqZw-wrsx7J39MfzGo3_NzoKuH2ed8lNKwNvkW2kNImbhMaSTfXsmBZSv-A8xyLQa-_-Wqm0b43Wo';
const FUNCTION_URL = 'https://vpeyqgijajywgswmezlh.supabase.co/functions/v1/rapid-function';

function log(msg, tipo = 'info') {
  const box = document.getElementById('logBox');
  const linha = document.createElement('div');
  const hora = new Date().toLocaleTimeString('pt-BR');
  linha.innerHTML = `<span class="dim">[${hora}]</span> <span class="${tipo}">${msg}</span>`;
  if (box.querySelector('.dim')?.textContent === 'Aguardando ação...') box.innerHTML = '';
  box.appendChild(linha);
  box.scrollTop = box.scrollHeight;
}

function setBadge(id, texto, tipo) {
  const el = document.getElementById(id);
  el.textContent = texto;
  el.className = `badge badge-${tipo}`;
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function rodarDiagnostico() {
  log('=== INICIANDO DIAGNÓSTICO ===', 'warn');

  // 1. Service Worker
  if ('serviceWorker' in navigator) {
    log('✅ Service Worker suportado', 'ok');
    setBadge('st-sw', 'OK', 'ok');
  } else {
    log('❌ Service Worker NÃO suportado', 'err');
    setBadge('st-sw', 'Não suportado', 'err');
    return;
  }

  // 2. PushManager
  if ('PushManager' in window) {
    log('✅ PushManager suportado', 'ok');
    setBadge('st-pm', 'OK', 'ok');
  } else {
    log('❌ PushManager NÃO suportado nesse browser', 'err');
    setBadge('st-pm', 'Não suportado', 'err');
    return;
  }

  // 3. Permissão
  const perm = Notification.permission;
  log(`ℹ️ Permissão de notificação: ${perm}`, perm === 'granted' ? 'ok' : 'err');
  setBadge('st-perm', perm, perm === 'granted' ? 'ok' : perm === 'denied' ? 'err' : 'warn');

  // 4. Service Worker registrado
  try {
    const reg = await navigator.serviceWorker.getRegistration('./sw.js');
    if (reg) {
      log(`✅ SW registrado: ${reg.scope}`, 'ok');
      
      // 5. Subscription
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        log('✅ Subscription existe', 'ok');
        setBadge('st-sub', 'Existe', 'ok');
        
        const endpoint = sub.endpoint;
        log(`ℹ️ Endpoint: ${endpoint.substring(0, 60)}...`, 'info');
        
        // Verificar se é endpoint antigo
        if (endpoint.includes('/fcm/send/')) {
          log('⚠️ ENDPOINT ANTIGO (/fcm/send/) — Google desativou esse formato!', 'err');
          setBadge('st-fcm', 'ANTIGO ⚠️', 'err');
        } else if (endpoint.includes('fcm.googleapis.com')) {
          log('✅ Endpoint FCM novo (formato correto)', 'ok');
          setBadge('st-fcm', 'OK', 'ok');
        } else {
          log(`ℹ️ Endpoint: ${endpoint.substring(0, 40)}`, 'info');
          setBadge('st-fcm', 'OK', 'ok');
        }
      } else {
        log('⚠️ Nenhuma subscription ativa', 'warn');
        setBadge('st-sub', 'Nenhuma', 'warn');
        setBadge('st-fcm', 'N/A', 'warn');
      }
    } else {
      log('⚠️ SW não registrado ainda', 'warn');
      setBadge('st-sub', 'SW não registrado', 'warn');
    }
  } catch(e) {
    log(`❌ Erro SW: ${e.message}`, 'err');
  }

  // 6. Config no banco
  log('🔍 Verificando config no banco...', 'info');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/configs?key=eq.push_sub_admin&select=key,value`, {
      headers: { 'apikey': SERVICE_KEY, 'Authorization': `Bearer ${SERVICE_KEY}` }
    });
    const rows = await res.json();
    if (rows && rows.length > 0) {
      const val = JSON.parse(rows[0].value);
      log(`✅ Config no banco: ${val.endpoint.substring(0, 50)}...`, 'ok');
      setBadge('st-db', 'OK', 'ok');
      
      if (val.endpoint.includes('/fcm/send/')) {
        log('❌ Config no banco tem endpoint ANTIGO — precisa renovar!', 'err');
        setBadge('st-db', 'Endpoint antigo!', 'err');
      }
    } else {
      log('❌ Nenhuma config no banco!', 'err');
      setBadge('st-db', 'Vazio', 'err');
    }
  } catch(e) {
    log(`❌ Erro banco: ${e.message}`, 'err');
    setBadge('st-db', 'Erro', 'err');
  }

  // 7. Testar Edge Function com skip
  log('🔍 Testando Edge Function (skip)...', 'info');
  try {
    const res = await fetch(FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SERVICE_KEY}` },
      body: JSON.stringify({ record: { status: 'skip' } })
    });
    const txt = await res.text();
    log(`✅ Edge Function respondeu: ${res.status} — ${txt}`, res.ok ? 'ok' : 'err');
    setBadge('st-fn', res.ok ? 'Acessível' : `${res.status}`, res.ok ? 'ok' : 'err');
  } catch(e) {
    log(`❌ Edge Function erro: ${e.message}`, 'err');
    setBadge('st-fn', 'Erro', 'err');
  }

  log('=== DIAGNÓSTICO CONCLUÍDO ===', 'warn');
}

async function renovarSubscription() {
  log('🔄 Renovando subscription...', 'warn');
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    await navigator.serviceWorker.ready;
    
    const subAntiga = await reg.pushManager.getSubscription();
    if (subAntiga) {
      await subAntiga.unsubscribe();
      log('✅ Subscription antiga removida', 'ok');
    } else {
      log('ℹ️ Nenhuma subscription antiga', 'info');
    }

    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      log('❌ Permissão negada!', 'err');
      return;
    }

    const novaSub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC)
    });
    log('✅ Nova subscription criada!', 'ok');
    log(`ℹ️ Endpoint: ${novaSub.endpoint.substring(0, 60)}...`, 'info');

    // Salva no banco
    const subJson = JSON.stringify(novaSub);
    const res = await fetch(`${SUPABASE_URL}/rest/v1/configs`, {
      method: 'POST',
      headers: {
        'apikey': SERVICE_KEY,
        'Authorization': `Bearer ${SERVICE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ key: 'push_sub_admin', value: subJson })
    });

    if (res.ok || res.status === 200 || res.status === 201) {
      log('✅ Subscription salva no banco!', 'ok');
    } else {
      // Tenta upsert
      const res2 = await fetch(`${SUPABASE_URL}/rest/v1/configs?key=eq.push_sub_admin`, {
        method: 'PATCH',
        headers: {
          'apikey': SERVICE_KEY,
          'Authorization': `Bearer ${SERVICE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ value: subJson })
      });
      log(res2.ok ? '✅ Subscription atualizada no banco!' : `⚠️ Banco status: ${res2.status}`, res2.ok ? 'ok' : 'warn');
    }

    log('🎉 Renovação concluída! Rode o diagnóstico de novo.', 'ok');
  } catch(e) {
    log(`❌ Erro: ${e.message}`, 'err');
  }
}

async function testarFuncao() {
  log('📡 Testando Edge Function com pedido real...', 'warn');
  try {
    const res = await fetch(FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SERVICE_KEY}` },
      body: JSON.stringify({ record: { status: 'Em produção', id: 999, customer_name: 'Teste Diagnóstico', total: 25.00 } })
    });
    const txt = await res.text();
    log(`Resposta: ${res.status} — "${txt}"`, res.ok ? 'ok' : 'err');
    if (txt === 'ok') log('🎉 Funcionou! Verifique se chegou notificação.', 'ok');
    else if (txt === 'no sub') log('⚠️ Função rodou mas não achou subscription no banco', 'warn');
    else if (txt === 'error') log('❌ Erro interno na função — veja os Logs no Supabase', 'err');
  } catch(e) {
    log(`❌ Erro: ${e.message}`, 'err');
  }
}

async function testarNotificacaoLocal() {
  log('🔔 Testando notificação local...', 'warn');
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { log('❌ Permissão negada', 'err'); return; }
  new Notification('🔔 Teste — O Rei da Coxinha', {
    body: 'Cliente Teste · R$ 25,00',
    icon: './icone.png'
  });
  log('✅ Notificação local enviada! Apareceu?', 'ok');
}

async function limparTudo() {
  log('🗑️ Limpando SW e subscription...', 'warn');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) {
      const sub = await reg.pushManager.getSubscription();
      if (sub) { await sub.unsubscribe(); log('✅ Subscription removida', 'ok'); }
      await reg.unregister();
      log(`✅ SW removido: ${reg.scope}`, 'ok');
    }
    log('✅ Tudo limpo! Recarregue a página do admin para registrar de novo.', 'ok');
  } catch(e) {
    log(`❌ Erro: ${e.message}`, 'err');
  }
}

async function verSubscription() {
  try {
    const reg = await navigator.serviceWorker.getRegistration('./sw.js');
    if (!reg) { log('❌ SW não registrado', 'err'); return; }
    const sub = await reg.pushManager.getSubscription();
    if (!sub) { log('ℹ️ Nenhuma subscription ativa', 'warn'); return; }
    log('=== SUBSCRIPTION ATUAL ===', 'warn');
    log(`Endpoint: ${sub.endpoint}`, 'info');
    log(`Expira: ${sub.expirationTime || 'nunca'}`, 'info');
    const keys = sub.toJSON().keys;
    log(`p256dh: ${keys.p256dh.substring(0, 30)}...`, 'info');
    log(`auth: ${keys.auth}`, 'info');
  } catch(e) {
    log(`❌ Erro: ${e.message}`, 'err');
  }
}

// Roda diagnóstico automático ao carregar
window.addEventListener('load', () => {
  setTimeout(rodarDiagnostico, 500);
});
</script>
</body>
</html>
